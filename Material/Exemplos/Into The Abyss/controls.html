<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Into The Abyss</title>
  <link rel="stylesheet" type="text/css" href="styles.css">
</head>
<body>
  <div id="ui-wrapper">
    <h1 class="controls-title">Controles</h1>
    <div id="controls">
      <div class="cm-section">
        <p class="cm-section-title">Habilidades</p>
        <div class="cm-grid">
          <div class="cm-row"><span class="cm-key">WASD / SETAS</span><span class="cm-desc">Mover</span></div>
          <div class="cm-row"><span class="cm-key">ESPAÇO</span><span class="cm-desc">Pular</span></div>
          <div class="cm-row"><span class="cm-key">J / Z</span><span class="cm-desc">Atacar</span></div>
          <div class="cm-row"><span class="cm-key">X / K</span><span class="cm-desc">Magia</span></div>
          <div class="cm-row"><span class="cm-key">C / L</span><span class="cm-desc">Escudo</span></div>
          <div class="cm-row"><span class="cm-key">Q / H</span><span class="cm-desc">Cura</span></div>
          <div class="cm-row"><span class="cm-key">F</span><span class="cm-desc">Explosão arcana</span></div>
          <div class="cm-row"><span class="cm-key">R</span><span class="cm-desc">Invocar familiar</span></div>
          <div class="cm-row"><span class="cm-key">SHIFT</span><span class="cm-desc">Dash</span></div>
        </div>
      </div>
      <hr class="cm-divider">
      <div class="cm-section">
        <p class="cm-section-title">Grimório</p>
        <div class="cm-grid">
          <div class="cm-row"><span class="cm-key">G</span><span class="cm-desc">Abrir / fechar</span></div>
          <div class="cm-row"><span class="cm-key">SETAS</span><span class="cm-desc">Paginar</span></div>
          <div class="cm-row"><span class="cm-key">ESC</span><span class="cm-desc">Fechar janela</span></div>
        </div>
      </div>
      <hr class="cm-divider">
      <div class="cm-section">
        <p class="cm-section-title">NPCs</p>
        <div class="cm-grid">
          <div class="cm-row"><span class="cm-key">E</span><span class="cm-desc">Interagir</span></div>
          <div class="cm-row"><span class="cm-key">ESC</span><span class="cm-desc">Fechar janela</span></div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
